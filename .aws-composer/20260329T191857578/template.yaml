AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: Serverless URL Shortener with Analytics

Parameters:
  CloudFrontDomainParam:
    Type: String
    Default: "d21sqexfhvaqit.cloudfront.net" # Default value for local testing, should be overridden
    Description: "CloudFront distribution domain name for constructing short URLs"

Globals:
  Function:
    Timeout: 5
    Runtime: python3.12
    Tracing: Active
    MemorySize: 256

Resources:
  # DynamoDB tables for storing URL mappings and analytics events with appropriate key schemas, billing mode,
  # and TTL for URLTable to automatically expire old entries.

  UrlTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: UrlTable
      AttributeDefinitions:
        - AttributeName: shortCode
          AttributeType: S
      KeySchema:
        - AttributeName: shortCode
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: ttl

  AnalyticsEvent:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: AnalyticsEvent
      AttributeDefinitions:
        - AttributeName: shortCode
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: shortCode
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # Lambda functions for URL shortening, redirection, and analytics processing with appropriate permissions and event triggers

  ShortenFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: src/shorten/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: UrlTable
      Environment:
        Variables:
          CLOUDFRONT_DOMAIN: !Ref CloudFrontDomainParam
      Events:
        ShortenApi:
          Type: Api
          Properties:
            Path: /shorten
            Method: POST

  RedirectFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: src/redirect/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: UrlTable
        - EventBridgePutEventsPolicy:
            EventBusName: default
      Events:
        RedirectApi:
          Type: Api
          Properties:
            Path: /r/{shortCode}
            Method: GET

  AnalyticsProcessor:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: src/analytics/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: AnalyticsEvent
      Events:
        AnalyticsEventRule:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - "urlshortener.redirect"

  AnalyticsApi:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambda_handler
      CodeUri: src/analytics_api/
      Policies:
        - DynamoDBReadPolicy:
            TableName: AnalyticsEvent
        - DynamoDBReadPolicy:
            TableName: UrlTable
      Events:
        AnalyticsApi:
          Type: Api
          Properties:
            Path: /analytics/{shortCode}
            Method: GET

  # Analytics EventRule to trigger the AnalyticsProcessor Lambda function whenever a redirect event is emitted.
  AnalyticsEventRule:
    Type: AWS::Events::Rule
    Properties:
      EventPattern:
        source:
          - "urlshortener.redirect"
      Targets:
        - Arn: !GetAtt AnalyticsProcessor.Arn
          Id: "AnalyticsProcessorTarget"

  AnalyticsProcessorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnalyticsProcessor
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt AnalyticsEventRule.Arn

  # Frontend S3 bucket to host the static website with public access blocked and versioning enabled for better management

  FrontEndBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-frontend"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # CloudFront distribution to serve the frontend from S3 with Origin Access Identity for secure access

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html

        Origins:
          - Id: FrontendOrigin
            DomainName: !GetAtt FrontEndBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${FrontendOriginAccessIdentity}"

          - Id: ApiOrigin
            DomainName: !Sub "${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: "/Prod"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only

        CacheBehaviors:
          - PathPattern: "shorten"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac"

          - PathPattern: "api/*"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac"

          - PathPattern: "r/*"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac"

          - PathPattern: "analytics/*"
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
            OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac"

        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"
          OriginRequestPolicyId: "b689b0a8-53d0-40ab-baf2-68738e2966ac"

        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: "/index.html"

        ViewerCertificate:
          CloudFrontDefaultCertificate: true

        PriceClass: PriceClass_100

  # Frontend Origin Access Identity to securely allow CloudFront to access the S3 bucket without making it public,
  # along with a bucket policy to grant the necessary permissions.

  FrontendOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "Access Identity for ${AWS::StackName} frontend"

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontEndBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt FrontendOriginAccessIdentity.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub "arn:${AWS::Partition}:s3:::${FrontEndBucket}/*"

Outputs:
  FrontendBucketName:
    Description: Name of the S3 bucket hosting the frontend
    Value: !Ref FrontEndBucket

  FrontEndBucketArn:
    Description: ARN of the S3 bucket hosting the frontend
    Value: !Sub "arn:${AWS::Partition}:s3:::${FrontEndBucket}"

  BucketPolicyResourcePreview:
    Description: ARN of the S3 bucket for bucket policy reference
    Value: !Sub "arn:${AWS::Partition}:s3:::${FrontEndBucket}/*"

  CloudFrontDomainName:
    Description: CloudFront distribution domain name
    Value: !GetAtt FrontendDistribution.DomainName

  ShortenApiUrl:
    Description: API path for creating short URLs through CloudFront
    Value: !Sub "https://${FrontendDistribution.DomainName}/shorten"

  RedirectBaseUrl:
    Description: Base path for redirect URLs through CloudFront
    Value: !Sub "https://${FrontendDistribution.DomainName}/r/"
